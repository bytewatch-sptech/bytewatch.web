<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ByteWatch | Login</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="login.css">
    <link rel="icon" href="assets/logo-cd.png">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=League+Spartan:wght@100..900&display=swap" rel="stylesheet">
</head>
<body>
    
    <div class="login-box p-0">
        <div class="login-corpo row">
            <div class="bloco-branco col position-relative"> <!-- bloco branco -->

                <div class="apresentacao">
                    <h1><b>Bem-vindo(a)!</b></h1>
                    <p class="fs-5">Acesse sua conta coorporativa por aqui!</p>
                </div>

                <div class="login flex-grow-1 d-flex flex-column py-3">

                        <div class="inputs d-grid col-12">
                            <span>Email</span> 
                            <input id="email_input"  type="text" value="vitoria@email.com">
                        </div>

                        <div class="inputs position-relative d-grid col-12">
                            <span>Senha</span> 
                            <input id="senha_input" type="password" maxlength="30" value="Abcde#123456789">
                            <img src="assets/olho-fechado.png" id="img">
                        </div>

                        <div class="entrar d-flex flex-column gap-1 align-items-center text-center">
                            <button class="botao-entrar" onclick="entrar()">Entrar</button>
                            <div class="mensagem d-flex flex-column">
                                <span>Esqueceu a senha? <a href="">Clique aqui.</a></span>
                                <span>Ainda não possui uma conta? <a href="cadastro.html">Clique aqui.</a></span>
                            </div>
                        </div>

                </div>

                <div class="voltar d-flex mt-auto d-xxl-none position-absolute bottom-0 end-0" style="max-width: 375px; max-height: 50px;"> <!-- mt-auto=margem superior automática-->
                    <img src="assets/seta-rosa.png">
                    <p><a href="index.html" class="fs-6">Voltar para a página principal</a></p>
                </div>

            </div>

            <div class="bloco-cinza col d-flex flex-column d-none d-xxl-flex row py-0" style="max-width: 300px;"> <!-- bloco cinza-->

                <div class="logo flex-grow-1 d-flex flex-column align-items-center text-center justify-content-center" style="width: fit-content;"> <!-- flex-grow-1 ocupa todo o espaço vazio-->
                    <img src="assets/logo-cd.png" alt="logo-cd" class="img-fluid mb-3"> <!-- mb-3 m=margin; b=bottom; 3=tamanho da margem; -->
                    <img src="assets/logo-versao1.png" alt="bytewatch" class="img-fluid mb-3">
                    <span class="fs-6">Transformando a maneira de monitorar a infraestrutura do seu negócio!</span> 
                </div>

                <div class="voltar d-flex mt-auto" style="max-width: 375px; max-height: 50px;"> <!-- mt-auto=margem superior automática-->
                    <img src="assets/seta-rosa.png">
                    <p><a href="index.html" class="fs-6">Voltar para a página principal</a></p>
                </div>

            </div>
        </div>  
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

<script>

    // pega os elementos de acordo com o id (input e a img) e guarda em uma variável
    var senha = document.getElementById("senha_input");
    var trocarImg = document.getElementById("img");

    // adiciona um evento de clique (quando o usuário clicar no icone de "olho" vai executar o código abaixo)
    // === (serve para fazer uma comparação entre o valor e o tipo)
    trocarImg.addEventListener("click", () => {
        if (senha.type === "password") { // valida se o tipo do input é password 
            senha.type = "text";
            trocarImg.src = "assets/olho-aberto.png";
        } else {
            senha.type = "password"; 
            trocarImg.src = "assets/olho-fechado.png";
        }
    });

    function entrar() {
        var emailVar = email_input.value;
        var senhaVar = senha_input.value;

        if (emailVar == "" || senhaVar == "") {
            cardErro.style.display = "block"
            alert('Campos em branco');
            return false;
        }

        console.log("FORM LOGIN: ", emailVar);
        console.log("FORM SENHA: ", senhaVar);

        fetch("/usuarios/autenticar",
        {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                emailServer: emailVar,
                senhaServer: senhaVar
            }),
            

        }).then(function (resposta) {
            console.log("ESTOU NO THEN DO entrar()!"),
            console.log(resposta)

            if (resposta.ok) {
                console.log(resposta);

                resposta.json().then(json => {
                    console.log(json);
                    console.log(JSON.stringify(json));
                    sessionStorage.EMAIL_USUARIO = json.email;
                    sessionStorage.NOME_USUARIO = json.nome;
                    sessionStorage.ID_USUARIO = json.id_usuario;
                    console.log('Autenticação com sucesso.')

                    setTimeout(function () {
                        window.location = "./menu.html";
                    }, 1000); // apenas para exibir o loading

                });

            } else {

                console.log("Houve um erro ao tentar realizar o login!");

                resposta.text().then(texto => {
                    console.error(texto);
                });
            }

        }).catch(function (erro) {
            console.log("Deu ruim");
        })

        return false;
    }


</script>
