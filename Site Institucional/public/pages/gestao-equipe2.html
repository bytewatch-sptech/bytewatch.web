<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ByteWatch | Gestão de Equipe Dashboard</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="../css/sidebar.css">
    <link rel="stylesheet" href="../css/gestao-equipe2.css">

    <link rel="shortcut icon" href="../assets/logo-cd.png" type="image/x-icon">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=League+Spartan:wght@100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>
    <div class="home container-fluid p-0">
        <div class="row g-0 h-100 flex-nowrap">
            <main class="col-md-9 col-xl-10 d-flex flex-column p-4 conteudo-principal">
                <header class="d-flex align-items-center mb-4">
                    <div class="p-2 rounded me-3 fundo-icone-cabecalho">
                        <i class="bi bi-people fs-4 texto-ciano"></i>
                    </div>
                    <div>
                        <h2 class="text-white fs-4 fw-bold mb-1">Gestão de Equipe</h2>
                        <span class="text-secondary texto-pequeno">Atualizado: 14 de Mai 2026, 14:30</span>
                    </div>
                </header>

                <div class="d-flex justify-content-between align-items-center mb-4 flex-wrap gap-3">
                    <div class="d-flex align-items-center gap-3">
                        <i class="bi bi-funnel texto-ciano"></i>
                        <span class="text-secondary">Filtro</span>

                        <div class="input-group barra-pesquisa">
                            <input type="text" class="form-control bg-transparent border-0 text-white shadow-none"
                                placeholder="Pesquisar analista">
                            <span class="input-group-text bg-transparent border-0 text-secondary">
                                <i class="bi bi-search"></i>
                            </span>
                        </div>

                        <div class="emblema-filtro d-flex align-items-center gap-2">
                            <i class="bi bi-people-fill text-dark"></i>
                            <span class="text-dark fw-bold">Todos · 90</span>
                        </div>
                    </div>

                    <div class="d-flex fundo-escuro-arredondado p-1 rounded-pill">
                        <button class="btn btn-sm botao-alternar active rounded-pill px-4">Servidor</button>
                        <button class="btn btn-sm botao-alternar rounded-pill px-4 text-secondary">Servidor</button>
                    </div>
                </div>

                <div class="row g-3 mb-4">
                    <div class="col-12 col-sm-6 col-xl-3">
                        <div class="cartao-indicador p-3 rounded-4">
                            <div class="d-flex justify-content-between align-items-start mb-3">
                                <div class="caixa-icone icone-vermelho">
                                    <i class="bi bi-exclamation-triangle"></i>
                                </div>
                                <span class="emblema-tendencia tendencia-alta">
                                    <i class="bi bi-graph-up-arrow"></i> +8% vs sem. ant.
                                </span>
                            </div>
                            <p class="text-secondary mb-1 texto-pequeno">Alertas Processados (7d)</p>
                            <h3 class="text-white fw-bold mb-0">1,847</h3>
                        </div>
                    </div>
                    <div class="col-12 col-sm-6 col-xl-3">
                        <div class="cartao-indicador p-3 rounded-4">
                            <div class="d-flex justify-content-between align-items-start mb-3">
                                <div class="caixa-icone icone-ciano">
                                    <i class="bi bi-shield-check"></i>
                                </div>
                                <span class="emblema-tendencia tendencia-alta-verde">
                                    <i class="bi bi-graph-up-arrow"></i> +12% vs sem. ant.
                                </span>
                            </div>
                            <p class="text-secondary mb-1 texto-pequeno">Alertas em abertos</p>
                            <h3 class="text-white fw-bold mb-0">47</h3>
                        </div>
                    </div>
                    <div class="col-12 col-sm-6 col-xl-3">
                        <div class="cartao-indicador p-3 rounded-4">
                            <div class="d-flex justify-content-between align-items-start mb-3">
                                <div class="caixa-icone icone-amarelo">
                                    <i class="bi bi-clock"></i>
                                </div>
                                <span class="emblema-tendencia tendencia-baixa-verde">
                                    <i class="bi bi-graph-down-arrow"></i> -8% esta semana
                                </span>
                            </div>
                            <p class="text-secondary mb-1 texto-pequeno">MTTA - Tempo de Reconhecimento</p>
                            <h3 class="text-white fw-bold mb-0 d-flex align-items-baseline gap-1">4.2 <span
                                    class="fs-6 text-secondary fw-normal">min</span></h3>
                        </div>
                    </div>
                    <div class="col-12 col-sm-6 col-xl-3">
                        <div class="cartao-indicador p-3 rounded-4">
                            <div class="d-flex justify-content-between align-items-start mb-3">
                                <div class="caixa-icone icone-verde">
                                    <i class="bi bi-check-circle"></i>
                                </div>
                                <span class="emblema-tendencia tendencia-baixa-verde">
                                    <i class="bi bi-graph-down-arrow"></i> -15% esta semana
                                </span>
                            </div>
                            <p class="text-secondary mb-1 texto-pequeno">MTTR - Tempo de Resolução</p>
                            <h3 class="text-white fw-bold mb-0 d-flex align-items-baseline gap-1">23.5 <span
                                    class="fs-6 text-secondary fw-normal">min</span></h3>
                        </div>
                    </div>
                </div>
            </main>
        </div>
    </div>

</body>

</html>
