<script>
    async function buscarDatacenters () {
        var idEmpresa = sessionStorage.ID_EMPRESA;
        resultado = await buscarTodosServidoresService()
        let conteudoSelect = ""
        for (let i = 0; i < resultado.length; i++) {
            conteudoSelect += `<option value="${resultado[i].id_datacenter}">${resultado[i].nome_datacenters}</option>`
        }
        document.getElementById("select_datacenter").innerHTML += conteudoSelect;
    } 

    async function buscarFuncionarios () {
        var idEmpresa = sessionStorage.ID_EMPRESA;
        resultado = await buscarTodosFuncionariosService()
        let conteudoSelect = ""
        for (let i = 0; i < resultado.length; i++) {
            conteudoSelect += `<option value="${resultado[i].id_usuario}">${resultado[i].nome}</option>`
        }
        document.getElementById("select_funcionario").innerHTML += conteudoSelect;
    } 
    
    buscarDatacenters()
    buscarFuncionarios()
</script>
<script>
    function selecionarComponente(e) {
        const elemento = e.currentTarget
        if (elemento.value == "1") {
            elemento.value = "0"
            elemento.classList.remove("botao-selecionado");
        }
        else if (elemento.value == "0") {
            elemento.value = "1"
            elemento.classList.add("botao-selecionado");
        }
    }
    function cadastrarMaquina() {
        console.log('cadastrando')
        var idEmpresa = sessionStorage.ID_EMPRESA;
        var nome = document.getElementById("nomeServer").value;

        var local = parseInt(document.getElementById("select_datacenter").value);
        if (!local > 0) {
            alert("Selecione o datacenter")
            return
        }
        
        var ip = document.getElementById("ipServerInt").value;
        var so = document.getElementById("TipoServer").value;

        var cpu = document.getElementById("botao_cpu").value;
        var ram = document.getElementById("botao_ram").value;
        var disco = document.getElementById("botao_disco").value;
        var rede = document.getElementById("botao_rede").value;

        var capRede = parseInt(document.getElementById("capacidade_rede").value)
        var capCpu = parseInt(document.getElementById("capacidade_cpu").value)
        var capDisco = parseInt(document.getElementById("capacidade_disco").value)
        var capRam = parseInt(document.getElementById("capacidade_ram").value)

        console.log(nome)
        console.log(local)
        console.log(ip)
        console.log(so)
        console.log(idEmpresa)

        var componentes = []

        if (cpu == 1) {
            if (!capCpu > 0) {
                alert("Especifique a capacidade da CPU")
                return
            } 
            componenteCpu = {
                idComponente: 1,
                limiteAlerta: 90, 
                capacidade_limite: capCpu 
            }
            componentes.push(componenteCpu)
        }

        if (ram == 1) {
            if (!capRam > 0) {
                alert("Especifique a capacidade da RAM")
                return
            } 
            componenteRam = {
                idComponente: 2,
                limiteAlerta: 90, 
                capacidade_limite: capRam 
            }
            componentes.push(componenteRam)
        }

        if (disco == 1) {
            if (!capDisco > 0) {
                alert("Especifique a capacidade do Disco")
                return
            } 
            componenteDisco = {
                idComponente: 3,
                limiteAlerta: 90, 
                capacidade_limite: capDisco 
            }
            componentes.push(componenteDisco)
        }

        if (rede == 1) {
            if (!capRede > 0) {
                alert("Especifique a capacidade da Rede")
                return
            } 
            componenteRede = {
                idComponente: 4,
                limiteAlerta: 90, 
                capacidade_limite: capRede 
            }
            componentes.push(componenteRede)
        }

        

        // if (nome == "" || ip == "" || idEmpresa == undefined) {
        //     alert("Preencha os campos obrigatórios");
        //     return false;
        // }
        
        var ab = Math.floor(Math.random() * 5000) + 1;

        try {
            fetch("/servidor/cadastrar", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    nomeServer: nome,
                    localServer: local,
                    macServer: ip,
                    ipServer: ab,
                    tipoServer: so,
                    fkEmpresa: idEmpresa,
                    componentesServer: componentes
                })
            }).then(function (resposta) {
                if (resposta.ok) {
                    alert("Cadastro realizado!");
                } else {
                    alert("Erro ao cadastrar");
                }
            });
        } catch(erro) {
            alert("erroooo")
            console.log(erro);
            
        }

        return false;
    }
</script>
