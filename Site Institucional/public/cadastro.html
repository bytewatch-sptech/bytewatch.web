<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ByteWatch | Cadastro</title>

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="cadastro.css">
  <link rel="icon" href="assets/logo-cd.png">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=League+Spartan:wght@100..900&display=swap" rel="stylesheet">
</head>

<body>
  <div class="cadastro-box">
    <div class="sair d-flex justify-content-end align-items-center gap-2">
      <img height="15" width="15" src="assets/seta-rosa.png" alt="">
      <a class="fw-bold">Voltar para a página principal</a>
    </div>

    <div class="cadastro-corpo d-flex flex-column gap-4">
      <div class="cadastro-inicio">
        <div class="apresentacao">
          <h1 class="fw-bold">Bem-vindo(a)!</h1>
          <p>Crie sua conta coorporativa por aqui!</p>
        </div>
      </div>

      <div class="cadastro-campos d-flex flex-row gap-3">
        <div class="cadastro-parte col">
          <div class="campo">
            <span>Nome</span>
            <input type="text">
          </div>
          <div class="campo">
            <span>Email</span>
            <input type="text">
          </div>
          <div class="campo">
            <span>CPF</span>
            <input type="text">
          </div>
        </div>

        <div class="cadastro-parte col">
          <div class="campo">
            <span>Código do Funcionário</span>
            <input type="text">
          </div>
          <div class="campo">
            <span>Senha</span>
            <input type="text">
          </div>
          <div class="campo">
            <span>Confirmar Senha</span>
            <input type="text">
          </div>
        </div>
      </div>

      <div class="criar d-flex flex-column gap-1 align-items-center">
        <button class="botao-criar">Criar</button>
        <span>Já possui uma conta? <a href="">Clique aqui.</a></span>
      </div>
    </div>
  </div>
</body>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

</html>
